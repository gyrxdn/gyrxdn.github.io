    <style>

            box-sizing: border-box;
        }

        body {
            font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
            background: linear-gradient(135deg, #c8e6c9 0%, #81c784 50%, #a5d6a7 100%);

        }

    /* 横幅 */
    .hero {
        text-align: center;
        padding: 4rem 2rem;
        color: #2e7d32;
    }

    .hero h1 {
        font-size: 3rem;
        margin-bottom: 1rem;
        color: #1b5e20;
        font-weight: 700;
    }

    .hero p {
        font-size: 1.2rem;
        color: #388e3c;
    }

    /* 分类标签 */
    .categories {
        max-width: 1200px;
        margin: 0 auto 2rem;
        display: flex;
        justify-content: center;
        gap: 1rem;
        flex-wrap: wrap;
    }

    .category-btn {
        padding: 0.6rem 1.8rem;
        border: none;
        background: rgba(255, 255, 255, 0.8);
        color: #2e7d32;
        border-radius: 25px;
        cursor: pointer;
        transition: all 0.3s;
        font-size: 1rem;
        font-weight: 500;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    .category-btn:hover,
    .category-btn.active {
        background: #4caf50;
        color: white;
        transform: scale(1.05);
        box-shadow: 0 4px 15px rgba(76, 175, 80, 0.4);
    }

    /* 软件卡片网格 */
    .container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 0 2rem 3rem;
    }

    .software-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
        gap: 1.5rem;
    }

    .software-card {
        background: white;
        border-radius: 16px;
        overflow: hidden;
        box-shadow: 0 6px 18px rgba(0, 0, 0, 0.08);
        transition: all 0.3s;
    }

    .software-card:hover {
        transform: translateY(-6px);
        box-shadow: 0 12px 28px rgba(0, 0, 0, 0.12);
    }

    .card-body {
        padding: 1.5rem;
        text-align: center;
    }

    .card-body h3 {
        font-size: 1.1rem;
        color: #1b5e20;
        margin-bottom: 0.5rem;
        font-weight: 600;
    }

    .card-body .tag {
        display: inline-block;
        padding: 0.2rem 0.6rem;
        background: linear-gradient(135deg, #c8e6c9, #a5d6a7);
        color: #2e7d32;
        border-radius: 20px;
        font-size: 0.75rem;
        margin-bottom: 0.8rem;
        font-weight: 500;
    }

    .card-body p {
        color: #666;
        font-size: 0.9rem;
        line-height: 1.5;
        margin-bottom: 1rem;
    }

    .download-btn {
        display: block;
        width: 100%;
        padding: 0.6rem;
        background: linear-gradient(135deg, #66bb6a 0%, #43a047 100%);
        color: white;
        text-align: center;
        text-decoration: none;
        border-radius: 8px;
        font-weight: 500;
        font-size: 0.9rem;
        transition: all 0.3s;
        box-shadow: 0 3px 8px rgba(67, 160, 71, 0.3);
    }

    .download-btn:hover {
        transform: scale(1.02);
        box-shadow: 0 4px 12px rgba(67, 160, 71, 0.4);
    }

    /* 页脚 */
    footer {
        background: linear-gradient(135deg, #388e3c 0%, #2e7d32 100%);
        text-align: center;
        padding: 2rem;
        color: white;
    }

    footer p {
        opacity: 0.95;
    }

        /* 响应式 */
        @media (max-width: 768px) {
            .hero h1 {
                font-size: 2rem;
            }

            .nav-links {
                display: none;
            }

            .software-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>

            const filtered = category === 'all'

                : softwareData.filter(item => item.category === category);
            
            grid.innerHTML = filtered.map(item => {
                const downloadLink = item.downloadUrl || '#';
                
                return `
                <div class="software-card">
                    <div class="card-body">
                        <h3>${item.name}</h3>
                        <span class="tag">${item.tag}</span>
                        <p>${item.desc}</p>
                        <a href="${downloadLink}" class="download-btn" target="_blank">立即下载</a>
                    </div>
                </div>
            `}).join('');
        }

            btn.addEventListener('click', function() {
                document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');

            });
        });
